## Catalogs need to be unique because of the databricks metastore
## We will set the catalogs to only be accessible from their corresponding workspace
## that workspace will be linked to it own storage
## dev_catalogs will have unique schema names per user prefixed with their username so that there is seperation for experimentation
## staging_catalog and prod_catalog will have shared schema names
## schema names will not be defined here, a recommended pattern is to have them mirror layer names bronze, silver ... transformations, followed by their "domain" (may not be the right word) e.g. ods
## personal dabs should use personal auth but allow dev_user group view and dev_env_sp to manage it
## prod staging dab permissions should be via gitactions on pull request using service priniciple
## in future we should review permission on staging and prod as should be least privilege and done by service principles unless there is an issue
## we should have no user name based permissions
