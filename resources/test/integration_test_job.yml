resources:
  jobs:
    # rename run_unit_integration_test_in_dbx_env or something and update the gitaction calling it. Also runs data test now
    # this file should of been in the resources folder
    integration_test_job:
      name: "[${bundle.target}] Integration & Unit Test Runner"
      tasks:
        ##############################################
        ####################
        #
        # FYI - Pipelines do not rerun on bundle deploy or on code change, so to ensure data tests work pipelines must be run after code changes
        #     
        ####################

        # NEW: Run bronze pipeline first
        - task_key: run_bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_ods_ingestion.id}
        
        # NEW: Run silver pipeline after bronze
        - task_key: run_silver_pipeline
          # removed just for now
          depends_on:
           - task_key: run_bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_isreporter_live_dlt.id}
        #######################

        - task_key: run_all_tests
          depends_on: [run_silver_pipeline, run_bronze_pipeline] # For data quality tests we need to run all the pipelines to see the new result from them 
          # serverless instead # job_cluster_key: test_cluster
          notebook_task:
            # DAB knows to look relative to the YAML file location
            # This points to your 'Run_Tests' notebook in the repo
            # as it is this will run unit too atm
            notebook_path: ../../tests/Run_Tests.ipynb
            base_parameters:
              job.catalog: ${var.catalog}
              job.env_name:  ${var.env_name}
              job.pytest_marks: ${var.pytest_marks}