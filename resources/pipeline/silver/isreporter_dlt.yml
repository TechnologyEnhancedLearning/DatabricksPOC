# dont define variables here they are global anyway so set in dab
resources:
  pipelines:
    pipeline_isreporter_live_dlt:
      name: isreporter_live_dlt
      usage_policy_id: ${var.env_serverless_usage_policies.env_lh_live_id}
      libraries:
        - glob:      # go up resources/pipelines/silver then down
            include: ../../../src/silver/isreporter_dlt.py
      photon: true
      # good practice to specify its something to do with dlt having beta version?
      channel: current
      # would use is_continuous a databrick yml variable so staging prod was continuous if doing this outside poc
      continuous: false # maybe triggered for POC once works
      # By defining catalog here we set it for all jobs in the pipeline without needing to specify it with the variable when defining a table
      catalog: ${var.catalog}
      target: ${var.schema_prefix}${var.layer_silver}_${var.domain_reporting}
      serverless: true

