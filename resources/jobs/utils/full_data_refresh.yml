# This is called by the test job for the benefit of data quality tests however if it calls something that is running it will fail. Which could happen due to other triggers. A better approach to look into would be only running jobs when there isnt a current task in progresss
resources:
  jobs:
    medallion_refresh:
      name: "[${bundle.target}] medallion_refresh"
      tasks:
        - task_key: run_bronze_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_ods_ingestion.id}
      # not included serverless policy as this gets run by tests for the DQ tests, the best approach would be policy per task in the job calling this, and seperate the notebooks so each test task can be seperate [Not sure can do it task based](https://learn.microsoft.com/en-us/azure/databricks/admin/usage/budget-policies?source=recommendations#assign-permissions-on-a-policy)


        # Exclude streaming if they are triggered whilst active an error occurs
        # - task_key: run_silver_pipeline
        #   depends_on:
        #     - task_key: run_bronze_pipeline
        #   pipeline_task:
        #     pipeline_id: ${resources.pipelines.pipeline_isreporter_live_dlt.id}

        # qqqq want to be set by job calling it
      #usage_policy_id: ${var.env_serverless_usage_policies.env_lh_live_id}
      # Tags set by the budget policy, though doesnt seem to provide tags for the ui qqqq check - it does turn up in workflow ui
      tags:
        env: "Med-shouldBeOverWrittenWithPolicy-${var.env_name}"
        # qqqq want to be set by job calling it
        # costCentre: "Med-shouldBeOverWrittenWithPolicy-${var.env_name}"
        # test: "Med-shouldBeOverWrittenWithPolicy-all"
        detail: "MEd-checkUIflowPickedUp"
