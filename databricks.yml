bundle:
  name: DatabricksPOC
  uuid: ba682f8a-5d14-4ae7-a770-d6a359c0e835

# Importing resources. These are split into their own files for modularity
# qqqq comback may be a key place for dry
include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
# Then made available to python scriplts via spark.conf.get("bundle.<variable_name>") once exposed by the yml running that file
variables:
  catalog:
    description: Envirnoment specific catalog name
  # schema:
  #   default: qqqq-deleted-later
  #  description: Actually setting this with vars but included due to an error
  schema_prefix:
    default: "" # to be used in dev only so staging prod have no prefix value
    description: To prefix dev user schema names to allow multiple dev users to use same catalog with their own different schema names for development
  env_name:
    description: The environment name (personal, dev, staging, prod)
  storage_account:
    description: Seperate databricks workspaces dedicated storage (dev, staging, prod)
  # Storage principles id is used for name field in databricks.yml name the sp variable: <sp_name>_id
  # be nice to hide these in the cfg, github has these in vars anyway not seen this done tried cfg file and not tried a config.yml [example proj with {{ dev_sp }}](https://github.com/evanaze/dbx-asset-bundle-deployment/blob/main/databricks.yml) ... not seeing databricks bundle deploy -t staging --var dev_sp= being specified in the cicd
  dev_env_sp_id:
    default: "b0326488-f6b0-4c0f-bf20-a091224bad83"
  staging_env_sp_id:
    default: "d588f2c8-0c0a-4ded-9da2-0663bf8dd994"
  prod_env_sp_id:
    default: "811de200-7873-4ab3-a435-da3cddf13c36"

# for external package maybe qqqq i dont think we will export there are poetry bundle example repos if we decide to
# artifacts:
#   python_artifact:
#     type: whl
#     build: uv build --wheel

# Deployment environments
targets:

##########################################
# For manual deploy via ui or could be on push to your branch
###########################################
  # qqqq should we have a personal section for deploying to own space ???

############## DBX UI and from local machine deploys

  personal: 
    # qqqq what is the process of developing and deploying dabs for own area.
    # qqqq would it actually be staging with features against folders !!!!???
    # qqqq We do github checks against DEV and DEV would be analyst only env so do we actually want to deploy to dev shared workspace
    mode: development
    # Deploy under own user not service principle
    default: true
    # This is the the default deployment workspace
    workspace:
      # profile means in gets set values from [dev] section of databrickscfg useful on local machine, unneeded in databricks environment 
      # profile: dev
      # specify hosts in the databricks.yml not config for clarity
      # dev databricks host
      host: https://adb-295718430158257.17.azuredatabricks.net
      # Dev root path under each users home directory
      # because deploying as service principle -> /Workspace/Users/b0326488-f6b0-4c0f-bf20-a091224bad83/.bundle/DatabricksPOC so we need to decide if to personal area by own username or to a shared dev space
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/personal
    variables:
      env_name: personal
      catalog: dev_catalog
      # only dev has schema prefix as its per user
      #e.g. phil_ will become phil_bronze_ods if we do layer and domain? as our schema naming convention
      schema_prefix: ${workspace.current_user.short_name}_
      # dev storage account
      storage_account:  unifiedrptdeltalake
    permissions:
    - level: CAN_MANAGE
      user_name: ${workspace.current_user.userName} 
    - level: CAN_VIEW
      # Devs can see each others stuff
      group_name: dev_env_users



########### CICD DEPLOYS

  # qqqq should we have a personal section for deploying to own space ???
  dev: 
    # production because cicd is not going to deploying to workspaces it doesnt know the user
    # but also that will mean its more intensive so shouldnt it be dev but we are using sp qqqq
    mode: production
    default: true
    workspace:
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/dev
    variables:
      env_name: dev
      catalog: dev_catalog
      storage_account:  unifiedrptdeltalake
    permissions:
      - group_name: dev_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.dev_env_sp_id}" 
        level: CAN_MANAGE


  staging:
    # Staging should purely be for investigation and testing prior to going to prod it runs in production mode so will run and constant updates and should be through github actions and service principle on successful pull request 
    mode: production
    workspace:
      # specify in the databricks validate and deploy in cicd github no profile otherwise will fail to find vars, use profile only for deploying from local machnine
      # profile: staging #still failing can make the file on the fly but would prefer not to
      # staging databricks host
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/staging
    # qqqq adding this so jobs and pipelines are run as the service principle
    run_as:
      service_principal_name: "${var.staging_env_sp_id}"
    variables:
      env_name: staging
      catalog: staging_catalog
      # Staging storage account
      storage_account:  unifiedrptdeltalake
    permissions:
      - group_name: staging_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.staging_env_sp_id}" 
        level: CAN_MANAGE
      

  prod:
    # Automatically deployed to via git actions and service principle minimal testing on deploy as previously run on staging
    mode: production
    workspace:
      # specify in the databricks validate and deploy in cicd github no profile otherwise will fail to find vars, use profile only for deploying from local machnine
      # profile: prod
      # prod databricks host
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/prod
    # Exclude development and test artifacts we are not testing prod
    sync:
      exclude:
        - "tests/*"
        - "resources/test/*"
        - "scratch/*" 
        - "setup/*" #setup is instructions and manual setup
    variables:
      # when 3 databricks it will be a share catalog name across the databricks
      env_name: prod 
      catalog: prod_catalog
      # Prod storage account
      storage_account: unifiedrptdeltalake
    permissions:
      - group_name: prod_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.prod_env_sp_id}" 
        level: CAN_MANAGE
