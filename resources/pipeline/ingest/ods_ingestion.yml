## ⚠️ WARNING this job will fail if pipelines are running already ⚠️

## We should think about these resource files I think potentially a .yml per layer bronze.yml may make sense
## We will not define schemas here

###############################
# I am naming vars pipeline. from pipeline files

# dont define variables here they are global anyway so set in dab

# can group vars into anchors to reuse them
# naming vars with bundle. so they are clear as from databricks.yml
# naming vars with pipeline. so they are clear as from pipeline yml
x-bronze-config: &bronze-config
  bundle.env_name: ${var.env_name}
  bundle.storage_account: ${var.storage_account} #storage is environment specific so defined in databricks.yml
  pipeline.layer: ${var.layer_bronze} # if we are doing layer based resource files get from var
  # f"{ADLS_PROTOCOL}{container}@{storage_account}{ADLS_SUFFIX}/        -> py adds {folder_name}/"
  pipeline.storage_container_path: "abfss://${var.layer_bronze}@${var.storage_account}.dfs.core.windows.net/"


resources:
  pipelines:
    pipeline_ods_ingestion:
      name: ods_ingestion
      usage_policy_id: ${var.env_serverless_usage_policies.env_}
      libraries:
        - glob:
            include: ../../../src/ingestion/ods_ingest.py
      photon: true
      # good practice to specify its something to do with dlt having beta version?
      channel: current
      # By defining catalog here we set it for all jobs in the pipeline without needing to specify it with the variable when defining a table
      catalog: ${var.catalog}
      target: ${var.schema_prefix}${var.layer_bronze}_${var.domain_ods}
      serverless: true
      configuration:
        ############### Resource yml files for set of pipelines #################
        # If we do bronze, silver ... tranformation based layers with own yml files will define layer level vars here
        # for example this would be
        # bundle.layer_name: bronze -> #schema_layer = "bronze_" -> # schema_layer = spark.conf.get("bundle.layer_name")
      # configuration:
        <<: *bronze-config #config anchor point for bronze layer so all pipelines in this file will have this set of configs
        pipeline.domain: ${var.domain_ods} # if we then want to apply per pipeline variable here
        # Unset the bad account key so Unity Catalog managed identity is used instead
        #fs.azure.account.key.unifiedrptdeltalake.dfs.core.windows.net: ""