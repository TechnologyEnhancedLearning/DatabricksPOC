
########################################
#### POC NOTES  ############
########################################
#
## Seperate DBX workspaces per environment dev, staging, prod
### Catalogs need to be unique because of the databricks metastore
### We will set the catalogs to only be accessible from their corresponding workspace
## dev_catalogs will have unique schema names per user prefixed with their username so that there is seperation for experimentation
## staging_catalog and prod_catalog will have shared schema names
## dont use local secrets C:\Users\NM2.W9215KB2\.databrickscfg doesnt play well with git
## schema names will not be defined here, a recommended pattern is to have them mirror layer names bronze, silver ... transformations, followed by their "domain" (may not be the right word) e.g. ods
## personal dabs should use personal auth but allow dev_user group view and dev_env_sp to manage it
## prod staging dab permissions via gitactions on pull request using service priniciple
#
#######################################
#### Differences expect for final varsion
######################################
## storage account per environment
## different host for different databircks work spaces
## will load wheels via artifacts when we have them - no unless want to share with  other teams
#######################################
## ref [Evanaze example repo](https://github.com/evanaze/dbx-asset-bundle-deployment)
########################################

# TODO for any values exstract them to variable files maybe just service principles to the resource/environments/ folder

bundle:
  name: DatabricksPOC
  uuid: ba682f8a-5d14-4ae7-a770-d6a359c0e835

include:
  #   - 'variables/*.yml' if execute in order might be able to put vars in folders based off headings, may affect running in personal area before deploy?
  # - resources/variables/serverless_usage_policy_constants.yml
  # - resources/variables/env_serverless_usage_policy_constants.yml
  - resources/variables/*.yml
  - resources/environments/*.yml
  - resources/**/*.yml
  - resources/**/**/*.yml
# ** double astrix doesnt seem to do sub directories
# poc should show ods ingest, reporting, and tests jobs and pipeline

# When this list get unmanageable we may want to consider a constants file but for similicity here is best for now
variables:
    # qqqq redeclaring so it loads them?
  # serverless_usage_policies:
  #   type: complex
  # env_serverless_usage_policies:
  #   type: complex


  # ============================================================
  # Environment Configuration
  # Values that differ per deployment target (personal, dev,
  # staging, prod). These control namespace and isolation.
  # ============================================================

  catalog:
    description: Environment-specific Unity Catalog name

  schema_prefix:
    default: ""  # Used in dev only; staging and prod should remain empty
    description: Prefix applied to developer schemas to allow multiple dev users to share the same catalog safely

# qqqq i could just us bundle.target, maybe there was a reason
  env_name:
    description: Deployment environment name (personal, dev, staging, prod)

  is_continuous:
    default: "false"
    description: Set to true for continuous DLT pipeline mode. Staging and prod run continuous to mirror production behaviour. Personal and dev run triggered to save cost.


  # ============================================================
  # Infrastructure Configuration
  # Underlying storage and identity configuration tied to
  # workspace-level resources.
  # ============================================================

  storage_account:
    description: Databricks workspace-dedicated storage account (dev, staging, prod)

  # ============================================================
  # Notification Configuration
  # ============================================================

#qqqq implement these with vars that are not exposed to git
  alert_emails:
    description: List of email addresses for failure notifications

  # ============================================================
  # Service Principal Identity
  # Azure AD application (client) IDs used for authentication
  # per environment.
  # Naming convention: <environment>_env_sp_id
  # ============================================================

  dev_env_sp_id:
    default: "b0326488-f6b0-4c0f-bf20-a091224bad83"
    description: Service Principal client ID for dev environment

  staging_env_sp_id:
    default: "d588f2c8-0c0a-4ded-9da2-0663bf8dd994"
    description: Service Principal client ID for staging environment

  prod_env_sp_id:
    default: "811de200-7873-4ab3-a435-da3cddf13c36"
    description: Service Principal client ID for production environment

  # ============================================================
  # Testing Configuration
  # Controls automated test behavior during job execution.
  # ============================================================

  pytest_marks:
    default: ""
    description: Pytest marker expression passed by the job; see test README for available markers

# We are not making wheels they are recommended for sharing code and may help with pathing and can be deployed to a cluster for efficiency but one step out of scope and may be more useful for sharing with other dbx teams or between dabs when modular dabs
# artifacts:
#   python_artifact:
#     type: whl
#     build: uv build --wheel

# Deployment environments
targets:

############## DBX UI and from local machine deploys

  personal: 
   
    mode: development
    # Deploy under own user not service principle
    default: true
    # This is the the default deployment workspace
    workspace:
      # profile means in gets set values from [dev] section of databrickscfg useful on local machine, unneeded in databricks environment and doesnt play well with git
      host: https://adb-295718430158257.17.azuredatabricks.net
      # Dev root path under each users home directory
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/personal
    variables:
      env_name: personal
      catalog: dev_catalog
      # only personal has schema prefix as its per user
      #e.g. phil_ will become phil_bronze_ods if we do layer and domain? as our schema naming convention
      schema_prefix: ${workspace.current_user.short_name}_
      # dev storage account
      storage_account:  unifiedrptdeltalake
      is_continuous: false
      pytest_marks: "not dev_skip and not freshness and not manual"
      alert_emails: qqqq.can.i.grab.user.email.com
      #qqqq unclear whether seeing uses same stuff these should be own vars or dev ones
      env_serverless_usage_policies:
          env_test_all_id: ${var.serverless_usage_policies.dev_test_all_id}
          env_test_dq_id: ${var.serverless_usage_policies.dev_test_dq_id}
          env_test_int_id: ${var.serverless_usage_policies.dev_test_int_id}
          env_test_unit_id: ${var.serverless_usage_policies.dev_test_unit_id}
          env_analysis_batch_id: ${var.serverless_usage_policies.dev_analysis_batch_id}
          env_lh_live_id: ${var.serverless_usage_policies.dev_lh_live_id}
    permissions:
    - level: CAN_MANAGE
      user_name: ${workspace.current_user.userName} 
    - level: CAN_VIEW
      # Devs can see each others stuff
      group_name: dev_env_users



########### CICD DEPLOYS

  dev: 
    # production because cicd is not going to deploying to workspaces it doesnt know the user
    mode: production # production mode may use more resource by default unless we manage it
    default: true
    workspace:
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/dev
    variables:
      env_name: dev
      catalog: dev_catalog
      storage_account:  unifiedrptdeltalake
      is_continuous: false
      pytest_marks: "not dev_skip and not freshness and not manual"
      alert_emails: BUNDLE_VAR_dev_alert_emails_qqqq
      env_serverless_usage_policies:
        env_test_all_id: ${var.serverless_usage_policies.dev_test_all_id}
        env_test_dq_id: ${var.serverless_usage_policies.dev_test_dq_id}
        env_test_int_id: ${var.serverless_usage_policies.dev_test_int_id}
        env_test_unit_id: ${var.serverless_usage_policies.dev_test_unit_id}
        env_analysis_batch_id: ${var.serverless_usage_policies.dev_analysis_batch_id}
        env_lh_live_id: ${var.serverless_usage_policies.dev_lh_live_id}
    permissions:
      - group_name: dev_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.dev_env_sp_id}" 
        level: CAN_MANAGE

  staging:
    # Staging should purely be for investigation and testing prior to going to prod it runs in production mode so will run and constant updates and should be through github actions and service principle on successful pull request 
    mode: production
    workspace:
      # staging databricks host
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/staging
    run_as:
      service_principal_name: "${var.staging_env_sp_id}"
    variables:
      env_name: staging
      catalog: staging_catalog
      # Staging storage account
      # commenting for safety# is_continuous: true    #! ⚠️warning cost check behaviour before prod
      storage_account:  unifiedrptdeltalake
      pytest_marks: "not staging_skip and not freshness and not manual"
      alert_emails: BUNDLE_VAR_staging_alert_emails_qqqq
      env_serverless_usage_policies:
        env_test_all_id: ${var.serverless_usage_policies.staging_test_all_id}
        env_test_dq_id: ${var.serverless_usage_policies.staging_test_dq_id}
        env_test_int_id: ${var.serverless_usage_policies.staging_test_int_id}
        env_test_unit_id: ${var.serverless_usage_policies.staging_test_unit_id}
        env_analysis_batch_id: ${var.serverless_usage_policies.staging_analysis_batch_id}
        env_lh_live_id: ${var.serverless_usage_policies.staging_lh_live_id}
    permissions:
      - group_name: staging_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.staging_env_sp_id}" 
        level: CAN_MANAGE
      
  prod:
    # Automatically deployed to via git actions and service principle minimal testing on deploy as previously run on staging
    mode: production
    workspace:
      # specify in the databricks validate and deploy in cicd github no profile otherwise will fail to find vars, use profile only for deploying from local machnine
      # profile: prod
      # prod databricks host
      host: https://adb-295718430158257.17.azuredatabricks.net
      root_path: /Workspace/.bundle/${bundle.name}/prod
    # Exclude development and test artifacts we are not testing prod
    sync:
      exclude:
        - "requirements.txt"
        - ".github/"
        - ".pytest_cache/"
        - "docs/"
        - "notebooks/"
        - "tests/*"
        - "resources/test/*"
        - "scratch/*" 
        - "setup/*" #setup is instructions and manual setup for dbx not stored procs tables etc theyre in source
    variables:
      env_name: prod 
      catalog: prod_catalog
      # Prod storage account
      # commenting for safety# is_continuous: true    #!⚠️ warning cost check behaviour before prod
      storage_account: unifiedrptdeltalake
      alert_emails: BUNDLE_VAR_staging_alert_emails_qqqq
      # Prod will not have tests in its file system so no pytest_marks here
      env_serverless_usage_policies:
        env_analysis_batch_id: ${var.serverless_usage_policies.prod_analysis_batch_id}
        env_lh_live_id: ${var.serverless_usage_policies.prod_lh_live_id}
        # Note: You can leave test IDs blank here or map them to a default 
        # since Prod doesn't have test policies.
    permissions:
      - group_name: prod_env_users
        level: CAN_VIEW
      - service_principal_name: "${var.prod_env_sp_id}" 
        level: CAN_MANAGE



